name: Build Subscription (DEBUG)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 🔍 DEBUG - System Info
        run: |
          echo "=== PWD ==="
          pwd

          echo "=== LS ==="
          ls -la

          echo "=== GIT ROOT CHECK ==="
          git rev-parse --show-toplevel || true

          echo "=== GIT STATUS ==="
          git status || true

      - name: Fetch subscription
        run: |
          curl -sL "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: DEBUG - raw.txt preview
        run: |
          echo "=== RAW HEAD ==="
          head -c 300 raw.txt
          echo ""
          echo "=== FILE SIZE ==="
          wc -c raw.txt

      - name: Extract vless
        run: |
          grep -oE 'vless://[^"]+' raw.txt > nodes.txt || true

          echo "=== NODES COUNT ==="
          wc -l nodes.txt || true

      - name: DEBUG - nodes content
        run: |
          head nodes.txt || true

      - name: Encode base64
        run: |
          base64 -w 0 nodes.txt > sub.txt

          echo "=== SUB SIZE ==="
          wc -c sub.txt || true

      - name: DEBUG - final output
        run: |
          head -c 200 sub.txt
