name: Build Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DEBUG
        run: |
          pwd
          ls -la
          git status

      - name: Fetch subscription
        run: |
          curl -sL "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Extract
        run: |
          grep -oE 'vless://[^"]+' raw.txt > nodes.txt || true

      - name: Encode
        run: |
          base64 -w 0 nodes.txt > sub.txt

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add sub.txt
          git commit -m "update" || exit 0

          git push
