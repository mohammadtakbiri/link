name: Build Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch subscription
        run: |
          curl -L --max-time 30 "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Debug raw
        run: |
          echo "SIZE:"
          wc -c raw.txt
          echo "PREVIEW:"
          head -c 200 raw.txt

      - name: Decode / normalize
        run: |
          # اگر base64 بود decode کن
          if base64 -d raw.txt >/dev/null 2>&1; then
            base64 -d raw.txt > decoded.txt || cp raw.txt decoded.txt
          else
            cp raw.txt decoded.txt
          fi

      - name: Extract vless links safely
        run: |
          grep -oE 'vless://[^ \"]+' decoded.txt > nodes.txt || true

      - name: Fallback if empty
        run: |
          if [ ! -s nodes.txt ]; then
            echo "⚠️ fallback raw used"
            cp decoded.txt nodes.txt
          fi

      - name: Encode base64
        run: |
          base64 -w 0 nodes.txt > sub.txt
          echo "FINAL SIZE:"
          wc -c sub.txt

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add sub.txt
          git commit -m "update sub" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
