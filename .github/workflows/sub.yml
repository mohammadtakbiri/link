name: Build Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch subscription
        run: |
          curl -sL "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Extract vless
        run: |
          grep -oE 'vless://[^"]+' raw.txt > nodes.txt || true

      - name: Encode base64
        run: |
          base64 -w 0 nodes.txt > sub.txt

      - name: Upload to GitHub (NO GIT)
        uses: actions/upload-artifact@v4
        with:
          name: sub
          path: sub.txt
