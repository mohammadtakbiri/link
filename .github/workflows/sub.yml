name: Build Subscription

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch subscription
        run: |
          curl -sL "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Debug input
        run: |
          head -c 200 raw.txt

      - name: Extract vless
        run: |
          grep -oE 'vless://[^"]+' raw.txt > nodes.txt || true

      - name: Encode base64
        run: |
          base64 -w 0 nodes.txt > sub.txt

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git commit -m "update" || exit 0
          git push
