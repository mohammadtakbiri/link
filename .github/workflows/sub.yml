name: Build Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch subscription
        run: |
          curl -sL "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Extract vless
        run: |
          grep -oE 'vless://[^"]+' raw.txt > nodes.txt || true

      - name: Encode base64
        run: |
          base64 -w 0 nodes.txt > sub.txt

      - name: Prepare site
        run: |
          mkdir -p public
          cp sub.txt public/sub.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
