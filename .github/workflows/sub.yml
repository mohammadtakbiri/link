name: build-subscription

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch subscription
        run: |
          curl -L --max-time 30 "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Detect & decode input
        run: |
          echo "INPUT SIZE:"
          wc -c raw.txt

          # try base64 decode safely
          if base64 -d raw.txt >/dev/null 2>&1; then
            base64 -d raw.txt > decoded.txt
            echo "FORMAT: BASE64"
          else
            cp raw.txt decoded.txt
            echo "FORMAT: RAW"
          fi

      - name: Extract valid VLESS links
        run: |
          # extract only valid full links
          grep -oE 'vless://[^[:space:]]+' decoded.txt \
            | grep -E '.+@.+:[0-9]+\?.+' \
            > nodes.txt || true

          # remove broken/short lines
          awk 'length($0) > 60' nodes.txt > clean.txt
          mv clean.txt nodes.txt

          echo "VALID LINKS COUNT:"
          wc -l nodes.txt

          echo "SAMPLE LINKS:"
          head -n 5 nodes.txt

      - name: Validate output
        run: |
          if [ ! -s nodes.txt ]; then
            echo "ERROR: No valid VLESS nodes found"
            exit 1
          fi

      - name: Encode subscription
        run: |
          base64 -w 0 nodes.txt > sub.txt

          echo "FINAL SUB SIZE:"
          wc -c sub.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sub.txt nodes.txt

          git commit -m "update subscription" || echo "no changes"
          git push
