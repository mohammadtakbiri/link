name: Smart Subscription Builder (Stable)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch subscription
        run: |
          curl -L --max-time 20 "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Debug raw size
        run: |
          echo "RAW SIZE:"
          wc -c raw.txt
          echo "RAW PREVIEW:"
          head -c 300 raw.txt

      - name: Extract ALL vless (robust)
        run: |
          # remove html + extract urls safely
          cat raw.txt \
          | tr '\r\n' ' ' \
          | grep -oE 'vless://[^ "><]+' \
          > nodes.txt || true

          echo "NODES FOUND:"
          wc -l nodes.txt

      - name: Fallback if empty
        run: |
          if [ ! -s nodes.txt ]; then
            echo "⚠️ No vless found → fallback raw"
            cp raw.txt nodes.txt
          fi

      - name: Clean output
        run: |
          # remove duplicates + empty lines
          sort -u nodes.txt > clean.txt || true

      - name: Final output (NO base64)
        run: |
          cp clean.txt sub.txt

          echo "FINAL CHECK:"
          wc -c sub.txt
          head sub.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subscription
          path: sub.txt
