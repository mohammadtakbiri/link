name: Build Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download
        run: |
          curl -L --max-time 30 "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Detect + Decode safely
        run: |
          # اگر فایل base64 بود
          if head -c 20 raw.txt | grep -qE '^[A-Za-z0-9+/=]+$'; then
            echo "BASE64 detected"
            base64 -d raw.txt > decoded.txt || cp raw.txt decoded.txt
          else
            echo "PLAIN detected"
            cp raw.txt decoded.txt
          fi

      - name: Extract vless properly
        run: |
          grep -Eo 'vless://[^ \r\n]+' decoded.txt > nodes.txt || true

      - name: Fallback safe
        run: |
          if [ ! -s nodes.txt ]; then
            echo "⚠️ fallback activated"
            cp decoded.txt nodes.txt
          fi

      - name: Build final sub
        run: |
          base64 -w 0 nodes.txt > sub.txt
          echo "FINAL SIZE:"
          wc -c sub.txt

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sub.txt
          git commit -m "update sub" || exit 0
          git push
