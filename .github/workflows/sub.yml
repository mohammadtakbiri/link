name: Smart Subscription Builder

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch subscription
        run: |
          curl -sL "https://sub.firoozehmobile.sbs/sub/MTFfTW9oYW1tYWRUXzMxMTEsMTc4MjIwNDk1NwNY0pXttJ_k" -o raw.txt

      - name: Detect format + Normalize
        run: |
          echo "=== INPUT PREVIEW ==="
          head -c 200 raw.txt

          echo ""

          # 1) Try detect raw vless
          if grep -q "vless://" raw.txt; then
            echo "Detected: RAW VLESS LIST"
            grep -oE 'vless://[^"]+' raw.txt > nodes.txt || true

          # 2) Try base64 decode
          else
            echo "Detected: BASE64 or ENCODED SUB"

            base64 -d raw.txt > decoded.txt 2>/dev/null || cp raw.txt decoded.txt

            grep -oE 'vless://[^"]+' decoded.txt > nodes.txt || true
          fi

          echo "=== NODES FOUND ==="
          wc -l nodes.txt || true

      - name: Prevent empty output
        run: |
          if [ ! -s nodes.txt ]; then
            echo "WARNING: nodes.txt empty → fallback to raw"
            cp raw.txt nodes.txt
          fi

      - name: Encode for Passwall2
        run: |
          base64 -w 0 nodes.txt > sub.txt

          echo "=== FINAL SIZE ==="
          wc -c sub.txt

      - name: Upload artifact (safe output)
        uses: actions/upload-artifact@v4
        with:
          name: subscription
          path: sub.txt
